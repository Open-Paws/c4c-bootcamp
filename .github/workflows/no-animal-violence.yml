name: No Animal Violence Check (Advisory)
on:
  pull_request:
    paths:
      - '**/*.py'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.astro'
      - '**/*.md'
      - '**/*.yaml'
      - '**/*.yml'
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No Animal Violence (advisory - fail-on-findings=false)
        uses: Open-Paws/no-animal-violence-action@main
        with:
          fail-on-findings: false
